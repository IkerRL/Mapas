<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valorant Roulette // Sorteador de Mapas</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>

    <!-- Controles superiores -->
    <div class="top-bar">
        <div class="brand">VALORANT // SELECTOR DE MAPA</div>
        <button id="muteBtn" class="mute-btn" aria-label="Silenciar">
            <svg id="sound-icon" viewBox="0 0 24 24" width="24" height="24">
                <!-- Icono de altavoz encendido por defecto -->
                <path fill="currentColor" d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" />
            </svg>
        </button>
    </div>

    <!-- Lobby principal -->
    <div id="lobby" class="panel-fade-in">
        <div class="logo-container">
            <div class="valorant-icon-svg" id="sync-trigger" style="cursor: pointer;" title="Conectar a Sala">
                <svg viewBox="0 0 100 100" width="48" height="48" fill="#ff4655">
                    <path d="M47.7 10L10 47.7v4.6h37.7v37.7h4.6L90 52.3v-4.6H52.3V10h-4.6z"/>
                </svg>
            </div>
            <h1 class="main-title">VALORANT <span>ROULETTE</span></h1>
            <p class="subtitle">SORTEADOR DE MAPAS TÁCTICO</p>
        </div>

        <div class="lobby-content">
            <div class="map-pool-section">
                <h3 class="section-title">POOL DE MAPAS</h3>
                <div class="map-pool-controls">
                    <button type="button" class="btn-text-only" id="selectAllBtn">SELECCIONAR TODOS</button>
                    <span class="divider">/</span>
                    <button type="button" class="btn-text-only" id="currentRotationBtn">ROTACIÓN ACTUAL</button>
                    <span class="divider">/</span>
                    <button type="button" class="btn-text-only" id="deselectAllBtn">DESACTIVAR TODOS</button>
                </div>
                <div id="map-pool" class="map-pool-grid">
                    <!-- Generado dinámicamente -->
                </div>
            </div>

            <div class="action-section">
                <button id="playBtn" class="v-btn-play glow-effect">START</button>
                <p id="lobby-status" class="lobby-status-text"></p>
            </div>
        </div>
    </div>

    <!-- Contenedor de la ruleta -->
    <div id="roulette-container" class="csgo-overlay panel-fade-in" style="display: none;">
        <h2 class="roulette-header-title">SELECCIONANDO MAPA DE JUEGO</h2>
        <div class="roulette-viewport">
            <div class="selector"></div>
            <div class="items-wrap" id="items"></div>
        </div>
        <p id="status" class="status-text">BUSCANDO PARTIDA...</p>
    </div>

    <!-- Pantalla de ganador (Reward Display) -->
    <div id="reward-display" class="reward-overlay" style="display: none;">
        <div class="reward-content">
            <div class="reward-badge">PARTIDA ENCONTRADA</div>
            <h2 id="winner-name" class="reward-title">ASCENT</h2>
            <p id="winner-location" class="reward-subtitle">VENECIA, ITALIA</p>
            
            <div class="reward-image-container">
                <img id="winner-img" src="" alt="Ganador">
                <div class="image-glow"></div>
                <div class="image-corner top-left"></div>
                <div class="image-corner top-right"></div>
                <div class="image-corner bottom-left"></div>
                <div class="image-corner bottom-right"></div>
            </div>
            
            <button onclick="resetGame()" class="v-btn-play btn-small glow-effect">VOLVER AL LOBBY</button>
        </div>
    </div>

    <!-- Admin / Sync HUD -->
    <button class="admin-trigger-btn" id="sync-trigger-btn" title="Opciones de Red">⚙️</button>
    <div class="admin-console" id="admin-console">
        <div class="admin-header">
            <div class="admin-title">CONFIGURACIÓN DE SALA</div>
            <button class="admin-close" id="admin-close-btn">✖</button>
        </div>
        <div class="admin-body">
            <div class="admin-section">
                <div class="admin-input-group">
                    <label>NOMBRE DE SALA</label>
                    <input type="text" id="consoleSyncRoom" placeholder="Ej: TORNEO123" />
                </div>
                <div class="admin-row" id="sync-disconnected-controls">
                    <div class="admin-col">
                        <button class="admin-btn btn-primary" id="consoleBtnConnect">CONECTAR</button>
                    </div>
                </div>
                <div class="admin-row" id="sync-connected-controls" style="display: none; flex-direction: column; gap: 10px;">
                    <button class="admin-btn btn-primary" id="consoleBtnCopyLink" onclick="copyLinkFromConsole()">🔗 Copiar Enlace de Transmisión</button>
                    <button class="admin-btn btn-danger" onclick="disconnectMQTTFromConsole()">🔌 Salir de la Sala</button>
                </div>
                <div style="margin-top: 15px; display: flex; align-items: center; justify-content: space-between;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span id="consoleSyncStatusPulse" class="pulse-icon red"></span>
                        <span id="consoleSyncStatusText" class="status-badge status-disconnected">DESCONECTADO</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
